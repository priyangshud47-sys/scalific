kind = "web"
previewPath = "/"
title = "Scalific Agency Website"
version = "1.0.0"
id = "artifacts/scalific"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21466

[services.development]
run = "pnpm --filter @workspace/scalific run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/scalific", "run", "build" ]
serve = "static"
publicDir = "artifacts/scalific/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21466"
BASE_PATH = "/"
